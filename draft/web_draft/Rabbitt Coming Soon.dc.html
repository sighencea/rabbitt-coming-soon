<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  ::selection { background: #111; color: #f1ede5; }
  @keyframes rb-rise { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
</style>
</helmet>
<div style="position:relative; min-height:100vh; width:100%; background:#f1ede5; color:#111; font-family:'Archivo',system-ui,sans-serif; overflow:hidden; display:flex; flex-direction:column;">

  <!-- oversized watermark logomark -->
  <img src="assets/rabbitt-logomark.png" alt="" style="position:absolute; right:-7vw; bottom:-8vh; height:115vh; width:auto; opacity:0.05; pointer-events:none; user-select:none;">

  <!-- top bar -->
  <header style="position:relative; z-index:2; display:flex; align-items:center; justify-content:space-between; padding:28px 40px;">
    <img src="assets/rabbitt-logomark.png" alt="Rabbitt" style="height:34px; width:auto;">
    <span style="font-family:'JetBrains Mono',monospace; font-size:12px; letter-spacing:0.18em; text-transform:uppercase; color:#111; opacity:0.7;">EST. 2026 · Cut for character</span>
  </header>

  <!-- center content -->
  <main style="position:relative; z-index:2; flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:40px 24px 64px;">

    <div style="display:inline-flex; align-items:center; gap:9px; padding:8px 16px; border:1.5px solid #111; border-radius:999px; font-family:'JetBrains Mono',monospace; font-size:11.5px; letter-spacing:0.22em; text-transform:uppercase; margin-bottom:44px; animation:rb-rise .6s ease both;">
      <span style="width:7px; height:7px; border-radius:50%; background:#111; display:inline-block;"></span>
      Dropping Soon
    </div>

    <img src="assets/rabbitt-logo-slogan.png" alt="Rabbitt — Cut for character" style="width:min(560px,82vw); height:auto; margin-bottom:40px; animation:rb-rise .7s ease .05s both;">

    <p style="max-width:480px; margin:0 0 40px; font-size:18px; line-height:1.5; font-weight:500; color:#2b2b2b; animation:rb-rise .7s ease .1s both;">
      Heavyweight hoodies, built to last and cut for character. The first drop is almost here — be first through the door.
    </p>

    <!-- form -->
    <sc-if value="{{ submitted }}" hint-placeholder-val="{{ false }}">
      <div style="display:flex; align-items:center; gap:12px; padding:18px 26px; background:#111; color:#f1ede5; border-radius:14px; font-size:16px; font-weight:600; animation:rb-rise .5s ease both;">
        <span style="font-family:'JetBrains Mono',monospace;">✓</span>
        You're on the list. Watch your inbox.
      </div>
    </sc-if>
    <sc-if value="{{ notSubmitted }}" hint-placeholder-val="{{ true }}">
      <form onSubmit="{{ onSubmit }}" style="display:flex; flex-direction:column; align-items:center; gap:12px; width:min(440px,90vw); animation:rb-rise .7s ease .15s both;">
        <div style="display:flex; width:100%; background:#fff; border:1.5px solid #111; border-radius:14px; padding:6px; gap:6px;">
          <input type="email" required placeholder="you@email.com" value="{{ email }}" onInput="{{ onInput }}" style="flex:1; border:none; outline:none; background:transparent; font-family:'Archivo',sans-serif; font-size:16px; font-weight:500; padding:12px 14px; color:#111;">
          <button type="submit" style="border:none; background:#111; color:#f1ede5; font-family:'Archivo',sans-serif; font-weight:700; font-size:15px; letter-spacing:0.02em; padding:0 26px; border-radius:9px; cursor:pointer; white-space:nowrap;" style-hover="opacity:0.85;">Notify me</button>
        </div>
        <span style="font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:0.06em; color:#111; opacity:0.55;">No spam. One email when we go live.</span>
      </form>
    </sc-if>
  </main>

  <!-- footer -->
  <footer style="position:relative; z-index:2; display:flex; align-items:center; justify-content:space-between; padding:24px 40px; font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:0.12em; text-transform:uppercase; color:#111; opacity:0.6;">
    <span>© 2026 Rabbitt</span>
    <span style="display:flex; gap:22px;">
      <span>Instagram</span>
      <span>TikTok</span>
    </span>
  </footer>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { email: "", submitted: false };
  renderVals() {
    return {
      email: this.state.email,
      submitted: this.state.submitted,
      notSubmitted: !this.state.submitted,
      onInput: (e) => this.setState({ email: e.target.value }),
      onSubmit: (e) => { e.preventDefault(); this.setState({ submitted: true }); }
    };
  }
}
</script>
</body>
</html>
